<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Fair Web</title>
    <script>
      // GitHub Pages SPA redirect — preserves the requested path so the React
      // Router can handle it after index.html loads.
      // segmentsToKeep = 1 because this is a project page at /Fair_Web/
      var segmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.host +
        l.pathname.split('/').slice(0, 1 + segmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(segmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
